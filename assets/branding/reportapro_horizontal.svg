<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="80" x2="1520" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1E5"/>
      <stop offset="1" stop-color="#E8FFF8"/>
    </linearGradient>
    <linearGradient id="iconCard" x1="172" y1="186" x2="522" y2="706" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A3D"/>
      <stop offset="1" stop-color="#FF5A36"/>
    </linearGradient>
    <linearGradient id="check" x1="245" y1="420" x2="438" y2="532" gradientUnits="userSpaceOnUse">
